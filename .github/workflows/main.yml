name: Pinterest Automation Workflow

on:
  schedule:
    - cron: '0 12 * * *'  # Automatically executes every single day at 12:00 PM UTC
  workflow_dispatch:      # Unlocks a manual "Run button" in your GitHub dashboard

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai pillow requests

      - name: Execute Main Script Transformation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # Binds secure repository secret to local runtime env
        run: python master_run.py

      - name: Archive Generated Visual Assets
        uses: actions/upload-artifact@v4
        with:
          name: generated-pinterest-pins
          path: "*.png"   # Compiles all newly created image assets into a downloadable zip
