name: Pinterest Daily Publishing Engine

on:
  schedule:
    - cron: '0 10 * * *'  # Automatically runs every single day at 10:00 AM UTC
  workflow_dispatch:      # Retains manual override capability button

jobs:
  run-autopilot:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Source Code
        uses: actions/checkout@v4

      - name: Build Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Components
        run: pip install google-generativeai pillow requests

      - name: Execute Autonomous Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          PINTEREST_TOKEN: ${{ secrets.PINTEREST_TOKEN }}
        run: python master_run.py
