name: Pinterest Daily Publishing Engine

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-autopilot:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Source Code
        uses: actions/checkout@v4

      - name: Build Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded to 3.11 to clear the Python deprecation warning

      - name: Install System Components
        run: pip install google-genai pillow requests # Using the new Google GenAI SDK

      - name: Execute Autonomous Loop
        env: # THIS BLOCK IS CRITICAL - It bridges your GitHub secrets to the Python code
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          PINTEREST_TOKEN: ${{ secrets.PINTEREST_TOKEN }}
        run: python master_run.py
